eintraining. Nicht \xFCberspringen.",blocks:[{id:"ext",title:"1 \xB7 Streckung (Extension) \u2014 Priorit\xE4t #1",color:Ge,subtitle:"Volle Streckung ist der wichtigste Pr\xE4-OP-Faktor gegen Vernarbung.",items:[{name:"Streckung: Heel Prop ODER Prone Hang",dose:"3\u20135 Min, 2\xD7/Tag",cue:"Zwei Varianten, eine reicht. Heel Prop (R\xFCckenlage): nur die Ferse liegt erh\xF6ht auf einer Rolle/einem Handtuch, Unterschenkel und Knie schweben frei, die Kniekehle sinkt durch die Schwerkraft Richtung Boden. Prone Hang (Bauchlage): Oberschenkel liegt bis zum Knie auf der Bett-/Tischkante, der Unterschenkel h\xE4ngt frei nach unten. Beide: Schwerkraft zieht das Knie gerade \u2013 NICHT wippen. Optional 1\u20132 kg auf den Oberschenkel legen."}]},{id:"quad",title:"2 \xB7 Quadrizeps aktiv halten",color:Ce,subtitle:"Gegen die reflektorische Quad-Abschaltung \u2013 spart dir Wochen in der Reha.",items:[{name:"Quad Sets (isometrisch)",dose:"5\xD7 10 Sek \xB7 mehrmals t\xE4glich",cue:"Isometrisch = anspannen ohne Bewegung im Gelenk. Bein komplett gestreckt, Kniekehle in die Unterlage dr\xFCcken, Oberschenkel maximal anspannen \u2013 die Kniescheibe zieht nach oben. VMO = der innere, tropfenf\xF6rmige Muskel direkt oberhalb der Kniescheibe (innen); er stabilisiert die Kniescheibe und schaltet nach Verletzung/OP als Erstes ab. Trick: zwei Finger innen kurz oberhalb der Kniescheibe auflegen und sp\xFCren, wie der Muskel fest wird. Fu\xDFspitze leicht nach au\xDFen drehen betont ihn. Knie bleibt gerade, kein Schmerz. 3\u20135 Sek Pause zwischen den Wiederholungen."},{name:"Straight-Leg-Raise",dose:"3\xD7 10\u201315",cue:"Im LIEGEN auf dem R\xFCcken \u2013 betrifft das linke (verletzte) Bein. Rechtes Bein angewinkelt aufstellen (Fu\xDF am Boden), linkes Bein ganz gestreckt. Zuerst Quad anspannen, DANN das gestreckte Bein langsam ~30\u201345 cm heben, 2 Sek halten, langsam ab. Das Knie bleibt die ganze Zeit gerade \u2013 knickt es beim Heben ein, bist du zu hoch gegangen. Nicht h\xF6her als n\xF6tig: die Arbeit passiert unten, h\xF6her \xFCbernehmen nur die H\xFCftbeuger."},{name:"Terminal Knee Extension am Band",dose:"3\xD7 15  (Physio-Freigabe)",cue:"Trainiert die letzten Grade der Streckung (ca. 0\u201330\xB0, der VMO-Bereich). Elastikband auf Knieh\xF6he an etwas Festem anschlingen und so durchsteigen, dass das Band hinten in der Kniekehle des linken Beins liegt und dich nach vorne zieht. Fu\xDF flach am Boden, Knie leicht gebeugt (~20\u201330\xB0). Dann das Knie aktiv voll durchdr\xFCcken (Lockout) gegen den Bandzug, den Quad einrasten, ~2 Sek halten, kontrolliert in die leichte Beugung zur\xFCck. Bewegung kommt aus dem Knie \u2013 nicht das Becken nach hinten schieben. Erst nach Physio-Freigabe (belastet im Stehen)."}]},{id:"mob",title:"3 \xB7 Beweglichkeit \u2014 sanft",color:"#cf9a4e",subtitle:"Kniescheibe locker halten, Beugung vorsichtig \u2013 ohne die Meniskusnaht zu reizen.",items:[{name:"Patella-Mobilisation",dose:"30 Sek/Richtung",cue:"Bein komplett entspannt und gestreckt (Quad locker \u2013 bei Anspannung klemmt die Kniescheibe fest). Kniescheibe mit den Fingern fassen und sanft schieben: hoch/runter, dann nach innen/au\xDFen, je ~30 Sek. Sollte sich weich verschieben lassen. H\xE4lt die Kniescheibe beweglich und beugt Verklebungen (u. a. mit dem Hoffa-Fettk\xF6rper) vor. Ohne Schmerz."},{name:"Heel Slides",dose:"2\xD7 10  (Physio-Freigabe)",cue:"Im Liegen, linkes Bein gestreckt. Ferse langsam auf der Unterlage Richtung Ges\xE4\xDF ziehen, bis ein leichter Dehnreiz kommt oder ~90\xB0 erreicht sind, kurz halten, langsam zur\xFCck. Gewinnt sanft Beugung zur\xFCck. NICHT in Schmerz oder Widerstand forcieren \u2013 die Meniskusnaht mag keine erzwungene tiefe Beugung. Nur nach Physio-Freigabe, bei Erguss zur\xFCckhaltend."}]},{id:"swell",title:"4 \xB7 Erguss-Management",color:Ge,subtitle:"Schwellung runter = besseres OP-Ergebnis.",items:[{name:"Sprunggelenk-Pumpen",dose:"2\xD7 30 kr\xE4ftig",cue:"Im Liegen, Bein m\xF6glichst hochgelagert. Fu\xDFspitze kr\xE4ftig und z\xFCgig zum Schienbein ziehen und wieder wegstrecken (wie Gaspedal), 2\xD730. Die Waden-Muskelpumpe schiebt Erguss aus dem Knie ab. Kostet nichts \u2013 gern mehrmals t\xE4glich, besonders nach langem Sitzen."},{name:"Hochlagern + K\xFChlen",dose:"10\u201315 Min \xB7 v.a. abends",cue:"Bein \xFCber Herzh\xF6he lagern (z. B. auf Kissen) \u2013 die H\xF6he l\xE4sst die Schwellung abflie\xDFen. K\xFChlpack 15 Min mit Tuch dazwischen (nicht direkt auf die Haut), besonders abends und nach Belastung. Reduziert Erguss und Reiz."}]}],timing:[{Icon:zr,label:"Morgens",text:"Streckung + Quad Sets + SLR + Patella-Mobi. Weckt das Knie und setzt die volle Streckung f\xFCr den Tag."},{Icon:Ra,label:"Tags\xFCber",text:"Quad-Snacks: 3\u20134\xD7 am Tag je 5\xD710 Sek Quad Sets \u2013 z.B. am Schreibtisch. H\xE4lt den Quad wach."},{Icon:Dr,label:"Abends",text:"Volle Runde inkl. (freigegebener) Heel Slides + langes Hochlagern & K\xFChlen. Nimmt die Tagesschwellung raus."}],barometer:"Barometer: Jeden Morgen Streckung und Kniedicke checken. Mehr Schwellung oder weniger Streckung als am Vortag \u2192 Belastung am Knie zur\xFCckfahren, Basis hochfahren. Konstanz schl\xE4gt H\xE4rte."},qr={red:["Tiefe / belastete Kniebeugung \xFCber ~90\xB0 links","Drehen, Pivotieren, Verwringen unter Last & Stopp-/Cut-Bewegungen (gef\xE4hrdet die Meniskusnaht)","Valgus-Stress (linkes Knie f\xE4llt nach innen \u2013 Innenband)","Spr\xFCnge, Plyos, Impact, Lateral Bounds, Power Cleans mit Beinantrieb","Kniest\xE4nde, BJJ/Judo, alles mit vollem ROM oder Last in Endgraden","Beugung aggressiv \u201Ereinzwingen\u201C"],green:["Volle Streckung t\xE4glich wiederherstellen & halten","Quadrizeps aktiv halten (isometrisch, TKE, SLR, ggf. BFR)","Oberk\xF6rper, Rumpf & rechtes Bein voll belasten","Beugung sanft im schmerz-/schwellungsfreien Bereich (Ziel ~90\xB0)"],meniscus:"Meniskus-Merker f\xFCrs Arztgespr\xE4ch: Der Riss-Typ (vertikal, Hinterhorn, meniskokapsul\xE4r) ist oft n\xE4h s (siehe Basis-Tab)",category:"basis",sets:"\u2014",reps:"volle Runde",rest:"\u2013",weight:"\u2013",tip:"Warm-up. Streckung und Quad-Aktivierung zuerst."},{id:"pb2",number:2,name:"Open Book + Shoulder CARs",category:"mobility",sets:"2",reps:"6\u20138/Seite",rest:"\u2013",weight:"\u2013",tip:"Brustwirbels\xE4ule und Schultern mobilisieren."},{id:"pb3",number:3,name:"Bench Press",category:"main",sets:"4",reps:"5",rest:"2 Min",weight:"RPE 6\u20137",tip:"Der Haupt-Druck der Woche. Kontrolliertes Tempo, Schulterbl\xE4tter zusammenziehen."},{id:"pb4",number:4,name:"Overhead Press / DB Press",category:"main",sets:"4",reps:"6",rest:"90 Sek",weight:"RPE 6\u20137",tip:"Eine Variante w\xE4hlen (Langhantel-Overhead ODER Kurzhantel-Press). Sitzend oder stehend ohne Kniebeugung."},{id:"pb5",number:5,name:"Dips",category:"accessory",sets:"3",reps:"8\u201310",rest:"90 Sek",weight:"K\xF6rpergewicht",tip:"Volle ROM, leichte Vorlage."},{id:"pb6",number:6,name:"Face Pulls / Band External Rotation",category:"neck",sets:"3",reps:"15",rest:"45\u201360 Sek",weight:"leicht",tip:"Schulter-Prophylaxe \u2013 nicht streichen."}],principles:["Dr\xFCck-Tag \u2013 das Ziehen liegt auf Tag 1","Face Pulls als feste Schulter-Prophylaxe einplanen","Kein Beinantrieb \u2013 Knie bleibt ruhig"]},C:{label:"Tag 3",title:"Rechtes Bein + Glutes",subtitle:"gesundes Bein voll, H\xFCfte im sicheren Winkel",exercises:[{id:"pc1",number:1,name:"T\xE4gliche Basis (siehe Basis-Tab)",category:"basis",sets:"\u2014",reps:"volle Runde",rest:"\u2013",weight:"\u2013",tip:"Warm-up: heute zus\xE4tzlich H\xFCft- und Kn\xF6chel-Mobilit\xE4t."},{id:"pc2",number:2,name:"Einbeinige Beinarbeit RECHTS (Leg Press / Split Squat / Step-up)",category:"main",sets:"3",reps:"8\u201310",rest:"90 Sek",weight:"RPE 7\u20138",tip:"Eine Variante w\xE4hlen \u2013 empfohlen Leg Press (keine Balance aufs verletzte Bein). \xDCber den Cross-Education-Effekt h\xE4lt das Nervensystem auch links Kraft."},{id:"pc3",number:3,name:"Hip Thrust (kontrollierte ROM)",category:"main",sets:"4",reps:"8\u201310",rest:"90 Sek",weight:"RPE 7",tip:"Starke H\xFCftstreckung, Knie bleibt im sicheren Winkel. Beidbeinig, symmetrisch, kein Valgus."},{id:"pc4",number:4,name:"RDL einbeinig RECHTS",category:"main",sets:"3",reps:"8",rest:"90 Sek",weight:"RPE 7",tip:"Posterior Chain erhalten. Links nur mitlaufen lassen, keine Last darauf."},{id:"pc5",number:5,name:"Seated / Standing Calf Raises",category:"accessory",sets:"3",reps:"12\u201315",rest:"60 Sek",weight:"moderat",tip:"Wade belasten, Knie kaum beteiligt. Beidbeinig."}],principles:["Nur das gesunde rechte Bein belasten \u2013 links l\xE4uft nur mit","Hip Thrust im sicheren Kniewinkel, kein Valgus","Leg Press = keine Balance auf dem instabilen Knie"]},D:{label:"Tag 4",title:"Rotation + Core",subtitle:"Rumpfkraft f\xFCrs Grappling, F\xFC\xDFe fest",exercises:[{id:"pd1",number:1,name:"T\xE4gliche Basis (siehe Basis-Tab)",category:"basis",sets:"\u2014",reps:"volle Runde",rest:"\u2013",weight:"\u2013",tip:"Warm-up."},{id:"pd2",number:2,name:"Thorakale Mobilit\xE4t",category:"mobility",sets:"2",reps:"6\u20138/Seite",rest:"\u2013",weight:"\u2013",tip:"Vor der Rotationsarbeit."},{id:"pd3",number:3,name:"Landmine Rotations im Stand",category:"rotation",sets:"3",reps:"8/Seite",rest:"60\u201390 Sek",weight:"leicht\u2013moderat",tip:"Bewegung aus Rumpf & Schultern, F\xFC\xDFe fest, KEIN Pivot / keine Beindrehung."},{id:"pd4",number:4,name:"Med Ball Rotational im Stand",category:"explosive",sets:"3",reps:"6/Seite",rest:"60\u201390 Sek",weight:"3\u20135 kg",tip:"Tempo aus dem Rumpf, F\xFC\xDFe bleiben stehen. Kein Sprung, kein Pivot."},{id:"pd5",number:5,name:"Pallof Press",category:"core",sets:"3",reps:"12/Seite",rest:"60 Sek",weight:"moderat",tip:"Anti-Rotation, Stand stabil, Knie ruhig \u2013 nicht mitdrehen."},{id:"pd6",number:6,name:"Plank / Side Plank (Side Plank auf rechter Seite)",category:"core",sets:"3",reps:"30\u201340 Sek",rest:"45 Sek",weight:"K\xF6rpergewicht",tip:"Copenhagen Plank links weglassen \u2013 die Adduktorenlast reizt das Innenband."}],principles:["Rotation ohne Beindrehung \u2013 Kraft kommt aus dem Rumpf","Kein Pivot, kein Impact","Copenhagen Plank links gestrichen (Innenband-Schutz)"]},E:{label:"Tag 5",title:"Knie-Reha + Glute-med + Nacken",subtitle:"reizarm, hohe Frequenz f\xFCrs linke Bein",exercises:[{id:"pe1",number:1,name:"T\xE4gliche Basis + extra Streckung",category:"basis",sets:"\u2014",reps:"2\xD7 Runde",rest:"\u2013",weight:"\u2013",tip:"Heute die Streckung besonders lange \u2013 der ROM-Fokus-Tag."},{id:"pe2",number:2,name:"BFR Knee Extension LINKS (oder iso Quad-Serie)",category:"accessory",sets:"3\u20134",reps:"15\u201330",rest:"45 Sek",weight:"sehr leicht",tip:"Nur mit Physio-Freigabe. BFR erh\xE4lt Muskel bei minimaler Gelenklast. Ohne Freigabe: lange isometrische Quad-Sets."},{id:"pe3",number:3,name:"Wall Sit / Spanish Squat isometrisch LINKS",category:"core",sets:"3",reps:"20\u201330 Sek",rest:"60 Sek",weight:"K\xF6rpergewicht",tip:"Nur im schmerz-/schwellungsfreien Bereich (~0\u201360\xB0), Knie strikt \xFCber der Fu\xDFspitze, kein Valgus. Physio-Freigabe."},{id:"pe4",number:4,name:"Band Hip Abduction / Extension im Stand LINKS",category:"accessory",sets:"3",reps:"12",rest:"60 Sek",weight:"leichtes Band",tip:"Glute-med-Aktivierung, h\xE4lt die Beinachse \u2013 wichtig f\xFCr die sp\xE4tere Reha. Kein Valgus."},{id:"pe5",number:5,name:"Glute Bridges (beidbeinig \u2192 einbeinig rechts)",category:"accessory",sets:"3",reps:"12",rest:"60 Sek",weight:"K\xF6rpergewicht/leicht",tip:"H\xFCftstreckung ohne Kniebelastung, kein Valgus."},{id:"pe6",number:6,name:"Isometric Neck Holds + Band Neck",category:"neck",sets:"3",reps:"15 Sek/Richtung",rest:"30 Sek",weight:"leicht",tip:"Kein Muskelversagen \u2013 Qualit\xE4t vor Ego."}],principles:["Reizarmer Fokus-Tag f\xFCrs linke Knie \u2013 hohe Frequenz, wenig Last","Alles am linken Bein nur nach Physio-Freigabe","Bei M\xFCdigkeit: nur Basis + Mobilit\xE4t"]}},Af=[{id:"c1",number:1,name:"Ankle Rocks + World's Greatest Stretch",category:"mobility",sets:"2",reps:"5/Seite",rest:"\u2013",weight:"\u2013",tip:"Aktiviert Kn\xF6chel, H\xFCfte und Brustwirbels\xE4ule \u2013 bereitet den K\xF6rper auf die explosive Arbeit vor."},{id:"c2",number:2,name:"Power Cleans",category:"explosive",sets:"4",reps:"3",rest:"2-3 Min",weight:"~60 kg",tip:"Technik vor Last \u2013 explosiv aus der H\xFCfte ziehen, nicht aus dem unteren R\xFCcken. RPE 6-7 in Wo. 1-2, in Wo. 4-5 als 5\xD72 @ RPE 7-8."},{id:"c3",number:3,name:"Bulgarian Split Squat",category:"accessory",sets:"3",reps:"6-8/Seite",rest:"90 Sek",weight:"2\xD7 16-18 kg",tip:"Bewusst leichter als zuvor (vorher 2\xD724 kg) \u2013 reduziert die Gesamtbeinlast in Kombination mit Montag."},{id:"c4",number:4,name:"Med Ball Rotational Throws",category:"rotation",sets:"3",reps:"6/Seite",rest:"60-90 Sek",weight:"3-5 kg Medizinball",tip:"Maximale Geschwindigkeit, nicht maximales Gewicht \u2013 simuliert den H\xFCft-Schulter-Impuls bei W\xFCrfen."},{id:"c5",number:5,name:"Lateral Bounds",category:"explosive",sets:"3",reps:"4-6/Seite",rest:"60-90 Sek",weight:"K\xF6rpergewicht",tip:"Neu im Plan \u2013 baut laterale H\xFCftkraft auf (relevant f\xFCr W\xFCrfe & Guard-P\xE4sse). Landung kontrolliert abfangen, nicht auf maximale Weite gehen."},{id:"c6",number:6,name:"Sprawls",category:"core",sets:"3",reps:"8",rest:"60 Sek",weight:"K\xF6rpergewicht",tip:"Schnelle, saubere \xDCberg\xE4nge \u2013 in fr\xFChen Wochen Technik vor Tempo."},{id:"c7",number:7,name:"Copenhagen Plank",category:"core",sets:"3",reps:"15-20 Sek/Seite",rest:"45 Sek",weight:"K\xF6rpergewicht",tip:"Adduktoren-Stabilit\xE4t \u2013 wird oft vernachl\xE4ssigt, ist aber wichtig f\xFCr die H\xFCftgesundheit beim Grappling."},{id:"c8",number:8,name:"Neck Bridges",category:"neck",sets:"2",reps:"10-15 Sek",rest:"30 Sek",weight:"leicht",tip:"Sehr leicht beginnen \u2013 niemals bis zur Ersch\xF6pfung. Qualit\xE4t vor Ego."}],Nm={A:{label:"Tag A",title:"Posterior Chain + Grip + Nacken",subtitle:"Montag \xB7 nach dem Wochenende, abends leichtes Judo",exercises:[{id:"a1",number:1,name:"Hip CARs + 90/90 Hip Switches",category:"mobility",sets:"2",reps:"5/Seite",rest:"\u2013",weight:"\u2013",tip:"Aktive H\xFCftmobilit\xE4t vor dem Heben \u2013 bereitet die H\xFCfte auf Deadlift & Zercher Squat sowie auf Guard-Arbeit vor."},{id:"a2",number:2,name:"Deadlift",category:"main",sets:"4",reps:"5",rest:"2-3 Min",weight:"~125 kg*",tip:"Woche 1: erste S\xE4tze zur Kalibrierung nutzen \u2013 langsam zu einem Topsatz von 5 Wdh. bei RPE 7-8 hocharbeiten. Dieses Gewicht wird die neue Referenz, nicht der alte 1RM-Wert."},{id:"a3",number:3,name:"Zercher Squat",category:"main",sets:"3",reps:"6",rest:"90-120 Sek",weight:"~85 kg",tip:"Ellbogen eng an den Rippen, aufrechte Brust \u2013 direkter Transfer zu Standarbeit und Klammerpositionen."},{id:"a4",number:4,name:"Gi / Towel Pull-Ups",category:"accessory",sets:"4",reps:"6-8",rest:"90 Sek",weight:"+0-5 kg",tip:"Fokus auf festen Griff am Tuch/Gi \u2013 simuliert Gi-Kontrolle direkt."},{id:"a5",number:5,name:"Farmer's Carries",category:"accessory",sets:"3",reps:"30-40 m",rest:"90 Sek",weight:"2\xD7 32 kg",tip:'Der letzte Satz darf bis ans Griff-Limit gehen \u2013 der einzige "All-out"-Satz der Woche.'},{id:"a6",number:6,name:"Isometric Neck Holds",category:"neck",sets:"3",reps:"15 Sek/Richtung",rest:"30 Sek",weight:"\u2013",tip:"Kein Muskelversagen \u2013 Qualit\xE4t vor Ego. Baut Verletzungsschutz f\xFCr den Nacken auf."},{id:"a7",number:7,name:"Band Neck",category:"neck",sets:"2",reps:"15",rest:"30 Sek",weight:"leichtes Band",tip:"Kontrollierte Bewegung in alle Richtungen, locker bleiben."}],principles:["Woche 1: Deadlift-S\xE4tze zur Kalibrierung nutzen \u2013 der Topsatz bei RPE 7-8 wird die neue Referenz","RPE 6-7 in Wochen 1-2, RPE 7-8 in Wochen 4-5 \u2013 nie bis zum Failure","1\xD7 pro Woche ein Grip-Satz (Carry oder Pull-Up) bis ans Limit, sonst kontrolliert","Nacken: Qualit\xE4t vor Ego
